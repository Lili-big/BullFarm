name: stock-selection-agent
version: 0.2.0
language: zh-CN
purpose: >
  Rank candidate A-share stocks for 2-3 day continuation probability using
  medium-term trend, recent 5-day startup, sector strength, and market
  environment filters, then publish local structured dashboard data.

primary_skill: skills/stock-selection-agent

pipeline:
  - fetch_live_market_snapshot
  - build_trend_pool
  - build_startup_pool
  - build_sector_resonance_pool
  - apply_market_position_filter
  - output_buy_sell_plan
  - publish_local_dashboard_json

inputs:
  candidate_csv: data/sample_candidates.csv
  live_snapshot_csv: data/snapshots/YYYYMMDD/candidates.csv
  scoring_config: config/scoring_rules.json

outputs:
  live_snapshot_dir: data/snapshots
  daily_snapshot_dir: data/snapshots/YYYYMMDD
  daily_output_dir: outputs/daily/YYYYMMDD
  latest_daily_snapshot: data/snapshots/latest
  latest_daily_output: outputs/daily/latest
  job_store: outputs/jobs/job_runs.json
  dashboard_index: data/dashboard/runs_index.json
  dashboard_run_detail: data/dashboard/runs/YYYYMMDD.json
  markdown_report: outputs/selection_report.md
  scored_csv: outputs/selection_scores.csv

data_sources:
  primary: tencent_range
  fallbacks:
    - akshare
    - eastmoney-direct
    - sina-daily
    - tushare-pro
    - baostock
    - efinance

live_fetch_defaults:
  source: tencent_range
  mode: prefilter
  eastmoney_route: auto
  top: 100
  max_history: 500
  history_days: 150
  min_amount_billion: 0.5
  workers: 4
  quote_batch_size: 800
  include_bj: false

daily_job:
  job_type: daily_selection
  config: config/local_selection_job.json
  wrapper: backend.jobs.daily_selection
  script: skills/stock-selection-agent/scripts/run_daily_selection.py
  schedule:
    timezone: Asia/Shanghai
    local_time: "08:30"
    automation: daily-full-selection
    trading_days_only: true
    target_date_rule: previous_complete_trading_day
    holiday_calendar: config/trading_calendar.json
  required_invocation:
    - python
    - -m
    - backend.jobs.daily_selection
    - --trigger-source
    - codex_automation
  archive_pattern:
    snapshots: data/snapshots/YYYYMMDD
    outputs: outputs/daily/YYYYMMDD
  latest_on_success:
    snapshots: data/snapshots/latest
    outputs: outputs/daily/latest
  structured_results:
    job_store: outputs/jobs/job_runs.json
    dashboard_index: data/dashboard/runs_index.json
    dashboard_detail: data/dashboard/runs/YYYYMMDD.json
  failure_manifest: outputs/daily/YYYYMMDD/run_manifest.json

price_refresh_job:
  job_type: price_refresh
  wrapper: backend.jobs.price_refresh
  schedule:
    timezone: Asia/Shanghai
    local_time: "16:10"
    automation: daily-price-refresh
    trading_days_only: true
    target_date_rule: previous_trading_day
    holiday_calendar: config/trading_calendar.json
  required_invocation:
    - python
    - -m
    - backend.jobs.price_refresh
    - --trigger-source
    - codex_automation
  workflow:
    - validate_selection_results.py update-prices --all --latest
    - validate_selection_results.py analyze --all
    - build_dashboard_data.py

local_runtime:
  frontend:
    app_dir: frontend
    dev_command: npm run dev
    data_source: data/dashboard JSON
  backend:
    package: backend
    api: backend.api:app
    execution_owner: local machine
    trigger_owner: Codex automation
    required_env:
      - ADMIN_TRIGGER_TOKEN
      - APP_TIMEZONE
      - JOB_STORE_PATH
  storage:
    job_runs: outputs/jobs/job_runs.json
    dashboard:
      - data/dashboard/runs_index.json
      - data/dashboard/runs/YYYYMMDD.json

guardrails:
  - Do not treat single-day limit-up as sufficient.
  - Reject downtrend rebounds and liquidity failures.
  - Cap position when market score is below 5.
  - Always include stop-loss conditions before any participation suggestion.
  - Keep sample_candidates.csv as an offline reproducible fixture.
  - Treat live snapshots as rule-based screening inputs, not investment advice.
  - Frontend data must come from local dashboard JSON only.

disclaimer: Rule-based screening only; not investment advice.

validation:
  config: config/validation_rules.json
  validation_workbook: data/validation/output/stock_selection_log.xlsx
  backup_dir: data/validation/output/backup
  report_dir: data/validation/output/reports
  default_offsets: [0, 1, 2, 3, 5, 10]
  workflow:
    - snapshot_scored_selection
    - update_forward_prices
    - analyze_profitability
    - compare_history
    - generate_validation_report
    - publish_dashboard_json
  script: skills/stock-selection-agent/scripts/validate_selection_results.py
