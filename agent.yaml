name: stock-selection-agent
version: 0.1.0
language: zh-CN
purpose: >
  Rank candidate A-share stocks for 2-3 day continuation probability using
  medium-term trend, recent 5-day startup, sector strength, and market
  environment filters.
primary_skill: skills/stock-selection-agent
pipeline:
  - fetch_live_market_snapshot
  - build_trend_pool
  - build_startup_pool
  - build_sector_resonance_pool
  - apply_market_position_filter
  - output_buy_sell_plan
inputs:
  candidate_csv: data/sample_candidates.csv
  live_snapshot_csv: data/snapshots/YYYYMMDD_candidates.csv
  scoring_config: config/scoring_rules.json
outputs:
  live_snapshot_dir: data/snapshots
  live_fetch_meta: data/snapshots/YYYYMMDD_fetch_meta.json
  markdown_report: outputs/selection_report.md
  scored_csv: outputs/selection_scores.csv
data_sources:
  primary: akshare
  fallbacks:
    - tushare-pro
    - baostock
    - efinance
live_fetch_defaults:
  source: akshare
  mode: prefilter
  eastmoney_route: auto
  top: 100
  max_history: 500
  history_days: 150
  min_amount_billion: 0.5
  workers: 1
guardrails:
  - Do not treat single-day limit-up as sufficient.
  - Reject downtrend rebounds and liquidity failures.
  - Cap position when market score is below 5.
  - Always include stop-loss conditions before any participation suggestion.
  - Keep sample_candidates.csv as an offline reproducible fixture.
  - Treat live snapshots as rule-based screening inputs, not investment advice.
disclaimer: Rule-based screening only; not investment advice.

validation:
  config: config/validation_rules.json
  validation_workbook: data/validation/output/stock_selection_log.xlsx
  backup_dir: data/validation/output/backup
  report_dir: data/validation/output/reports
  default_offsets: [0, 1, 2, 3, 5, 10]
  workflow:
    - snapshot_scored_selection
    - update_forward_prices
    - analyze_profitability
    - compare_history
    - generate_validation_report
  script: skills/stock-selection-agent/scripts/validate_selection_results.py
